services:
  backend:
    build:
      context: ./backend
    container_name: backend
    networks:
      - app-network

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - app-network

networks:
  app-network:
    driver: bridge